<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <script src="/js/login.js" defer></script>
    <title>Projeto API</title>
</head>

<body>
    
    <header class="nav">
        <nav class="navbar">
            <div class="paragrafo">
                <p class="cadastrar">Ainda não possui cadastro?</p>
            </div>
            <div class="botão">
                <a href="cadastro.html" class="btnCadastro">
                    <button>Cadastrar</button>
                </a>
            </div>
        </nav>
    </header>

    <div class="box">
        <h1>Login</h1>
        <form class="loginForm" action="">
            <input type="text" class="nome" name="nome" placeholder="Nome" required>
            <input type="password" class="senha" name="senha" placeholder="Senha" required>
            <button type="submit">Cadastrar</button>
        </form>
        <p id="erroLogin"></p>
    </div>

</body>

</html>
